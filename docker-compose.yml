services:
  postgres:
    image: postgres:18
    container_name: go-cms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: go_cms
      POSTGRES_USER: go_cms
      POSTGRES_PASSWORD: go_cms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U go_cms -d go_cms"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
